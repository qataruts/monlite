name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        if: matrix.node == 22
        run: |
          pnpm lint
          pnpm format:check

      # -r runs across BOTH packages (core + sync), topologically ordered.
      - run: pnpm -r typecheck

      - run: pnpm -r build

      - name: Test (default / better-sqlite3)
        run: pnpm -r test

      - name: Test (node:sqlite backend)
        if: matrix.node == 22
        run: pnpm -r test
        env:
          MONLITE_DRIVER: node:sqlite

  mongo:
    runs-on: ubuntu-latest
    name: Mongo integration
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Start MongoDB (single-node replica set)
        run: |
          docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0
          for i in $(seq 1 30); do
            docker exec mongo mongosh --quiet --eval "db.runCommand({ping:1})" >/dev/null 2>&1 && break
            sleep 1
          done
          docker exec mongo mongosh --quiet --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})"
          sleep 3

      - run: pnpm install --frozen-lockfile

      - name: Integration tests (live MongoDB)
        run: pnpm --filter @monlite/sync test
        env:
          MONGO_URL: mongodb://localhost:27017/?directConnection=true
