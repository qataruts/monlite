name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        if: matrix.node == 22
        run: |
          pnpm lint
          pnpm format:check

      # -r runs across BOTH packages (core + sync), topologically ordered.
      - run: pnpm -r typecheck

      - run: pnpm -r build

      - name: Test (default / better-sqlite3)
        run: pnpm -r test

      - name: Test (node:sqlite backend)
        if: matrix.node == 22
        run: pnpm -r test
        env:
          MONLITE_DRIVER: node:sqlite

  # Catch OS-specific issues: native better-sqlite3 prebuilds, Windows file
  # locking, path handling, and the SIGKILL crash test on each platform.
  cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    name: ${{ matrix.os }} (Node 22)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Test (default / better-sqlite3)
        run: pnpm -r test

      - name: Test (node:sqlite backend)
        run: pnpm -r test
        env:
          MONLITE_DRIVER: node:sqlite

  mongo:
    runs-on: ubuntu-latest
    name: Integration (Mongo + Postgres + MySQL)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Start MongoDB (single-node replica set)
        run: |
          docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0
          for i in $(seq 1 30); do
            docker exec mongo mongosh --quiet --eval "db.runCommand({ping:1})" >/dev/null 2>&1 && break
            sleep 1
          done
          docker exec mongo mongosh --quiet --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})"
          sleep 3

      - name: Start PostgreSQL
        run: |
          docker run -d --name pg -e POSTGRES_PASSWORD=postgres -e POSTGRES_HOST_AUTH_METHOD=trust -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec pg pg_isready -U postgres >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Start MySQL
        run: |
          docker run -d --name mysql -e MYSQL_ALLOW_EMPTY_PASSWORD=yes -e MYSQL_DATABASE=monlite -p 3306:3306 mysql:8
          for i in $(seq 1 60); do
            docker exec mysql mysqladmin ping -h 127.0.0.1 --silent >/dev/null 2>&1 && break
            sleep 1
          done

      - run: pnpm install --frozen-lockfile

      - name: Integration tests (live MongoDB + PostgreSQL + MySQL)
        run: pnpm --filter @monlite/sync test
        env:
          MONGO_URL: mongodb://localhost:27017/?directConnection=true
          PG_URL: postgres://postgres:postgres@localhost:5432/postgres
          MYSQL_URL: mysql://root@localhost:3306/monlite
