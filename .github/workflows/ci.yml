name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

      - name: Test (default / better-sqlite3)
        run: pnpm test

      - name: Test (node:sqlite backend)
        if: matrix.node == 22
        run: pnpm test
        env:
          MONLITE_DRIVER: node:sqlite
