name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub releases
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter='!monlite-demo' build

      - run: pnpm -r test

      # Publishes every workspace package whose version isn't on npm yet, in
      # dependency order, rewriting `workspace:^` to a real range. core before sync.
      - run: pnpm -r publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      # Mirror every tagged npm publish as a GitHub Release.
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
