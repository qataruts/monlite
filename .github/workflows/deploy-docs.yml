name: Deploy docs

# Builds the Docusaurus site in docs/ and publishes it to GitHub Pages.
# One-time setup in the repo: Settings → Pages → Build and deployment → Source: "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "demo/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Build the @monlite/* packages + the Vite demo (workspace), then the docs
      # site, and fold the demo into the docs output so it serves at /demo.
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build # build the @monlite/* packages (demo's deps)
      - run: pnpm --filter monlite-demo build # build the browser demo → demo/dist (base /demo/)
      - run: ls -la demo/dist
      - name: Build docs site
        working-directory: docs
        run: npm ci && npm run build
      - run: cp -r demo/dist docs/build/demo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
